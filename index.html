<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vital Link - Gestión de Códigos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; font-family: sans-serif; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .qr-card { break-inside: avoid; page-break-inside: avoid; }
        @media print {
            .no-print { display: none; }
            .print-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS SVG (Corregidos con Fragmentos para evitar errores de sintaxis JSX) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
                dashboard: (
                    <>
                        <rect width="7" height="9" x="3" y="3" rx="1" />
                        <rect width="7" height="5" x="14" y="3" rx="1" />
                        <rect width="7" height="9" x="14" y="12" rx="1" />
                        <rect width="7" height="5" x="3" y="16" rx="1" />
                    </>
                ),
                plus: <path d="M12 5v14M5 12h14" />,
                user: (
                    <>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </>
                ),
                dog: (
                    <>
                        <path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-1.923.321-3.5 1.424-3.5 2.814 0 5.262 4.838 9.426 7 10.186M14 5.172c0-1.39 1.577-2.493 3.5-2.172 1.923.321 3.5 1.424 3.5 2.814 0 5.262-4.838 9.426-7 10.186" />
                        <path d="M12 15.574c.144-.01.272-.057.417-.057.145 0 .273.047.417.057 1.302.086 2.5.563 3.5 1.154.5.3.75.76.75 1.271v2a1 1 0 0 1-1 1h-8a1 1 0 0 1-1-1v-2c0-.511.25-.972.75-1.271 1-.591 2.198-1.068 3.5-1.154Z" />
                    </>
                ),
                search: (
                    <>
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </>
                ),
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                qr: (
                    <>
                        <rect width="5" height="5" x="3" y="3" rx="1" />
                        <rect width="5" height="5" x="16" y="3" rx="1" />
                        <rect width="5" height="5" x="3" y="16" rx="1" />
                        <path d="M21 16h-3a2 2 0 0 0-2 2v3" />
                        <path d="M21 21v.01" />
                        <path d="M12 7v3a2 2 0 0 1-2 2H7" />
                        <path d="M12 16v.01" />
                    </>
                ),
                x: <path d="M18 6 6 18M6 6l12 12" />,
                layers: (
                    <>
                        <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z" />
                        <path d="m2.2 12.91 8.97 4.07a2 2 0 0 0 1.66 0l8.97-4.07" />
                        <path d="m2.2 17.91 8.97 4.07a2 2 0 0 0 1.66 0l8.97-4.07" />
                    </>
                ),
                check: <path d="M20 6 9 17l-5-5" />,
                ticket: (
                    <>
                        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z" />
                        <path d="M13 5v2" />
                        <path d="M13 17v2" />
                        <path d="M13 11v2" />
                    </>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const QRGenerator = ({ value, size = 180, id }) => {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}`;
            return (
                <div className="flex flex-col items-center justify-center bg-white p-2 rounded-xl">
                    <img id={id} src={qrUrl} alt="QR" style={{ width: size, height: size }} className="rounded-lg" crossOrigin="anonymous" />
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('admin'); 
            const [dbUsers, setDbUsers] = useState([
                { id: 'VL-1001', name: 'Juan Pérez', type: 'human', status: 'active', phone: '+505 8888-8888', emergencyContact: 'María Pérez', photo: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80' },
                { id: 'VL-1002', name: 'Sin asignar', type: 'unknown', status: 'pending', photo: null }
            ]);
            const [selectedUser, setSelectedUser] = useState(null);
            const [batchSize, setBatchSize] = useState(5);

            const generateBatch = () => {
                // Obtener el número correlativo más alto actual
                const ids = dbUsers.map(u => parseInt(u.id.split('-')[1])).filter(n => !isNaN(n));
                const lastId = ids.length > 0 ? Math.max(...ids) : 1000;
                
                const newBatch = [];
                for(let i = 1; i <= batchSize; i++) {
                    newBatch.push({
                        id: `VL-${lastId + i}`,
                        name: 'Sin asignar',
                        type: 'unknown',
                        status: 'pending',
                        photo: null
                    });
                }
                setDbUsers([...newBatch.reverse(), ...dbUsers]);
                setView('admin');
            };

            const handleActivation = (id, formData) => {
                setDbUsers(dbUsers.map(u => u.id === id ? { 
                    ...u, 
                    ...formData, 
                    status: 'active',
                    photo: formData.type === 'pet' 
                        ? 'https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&w=100&q=80'
                        : 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80'
                } : u));
                setView('admin');
            };

            const BatchView = () => (
                <div className="p-6 bg-white h-full flex flex-col animate-slide-up">
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h2 className="text-2xl font-black uppercase tracking-tight text-indigo-900">Generar Lote</h2>
                            <p className="text-xs text-gray-400 font-bold">CREACIÓN DE CÓDIGOS CORRELATIVOS</p>
                        </div>
                        <button onClick={() => setView('admin')} className="p-2 bg-gray-100 rounded-full"><Icon name="x" size={20}/></button>
                    </div>
                    
                    <div className="bg-indigo-50 p-6 rounded-[32px] mb-6 border border-indigo-100">
                        <label className="text-[10px] font-black text-indigo-400 uppercase mb-3 block tracking-widest">Cantidad a imprimir/entregar</label>
                        <div className="flex items-center space-x-4">
                            <input 
                                type="number" 
                                min="1"
                                max="50"
                                value={batchSize} 
                                onChange={e => setBatchSize(parseInt(e.target.value) || 1)} 
                                className="flex-1 p-5 rounded-2xl text-2xl font-black outline-none border-2 border-transparent focus:border-indigo-500 bg-white" 
                            />
                            <button 
                                onClick={generateBatch} 
                                className="bg-indigo-600 text-white p-5 rounded-2xl font-black px-8 shadow-lg shadow-indigo-200 active:scale-95 transition-transform"
                            >
                                GENERAR
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex-1 border-2 border-dashed border-gray-100 rounded-[32px] p-6 flex flex-col items-center justify-center text-center">
                        <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                            <Icon name="layers" size={32} className="text-gray-300" />
                        </div>
                        <p className="text-sm text-gray-500 font-medium px-4">
                            Los códigos se generarán con un estado <span className="text-orange-500 font-bold">Pendiente</span>. 
                            Podrás entregarlos físicamente y el usuario los activará al primer escaneo.
                        </p>
                    </div>
                </div>
            );

            const RegistrationForm = ({ userId }) => {
                const [form, setForm] = useState({ type: 'human', name: '', age: '', bloodType: 'O+', breed: '', emergencyContact: '', phone: '' });
                return (
                    <div className="flex flex-col h-full bg-white animate-slide-up">
                        <div className="p-8 border-b text-center">
                            <div className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-100">
                                <Icon name="qr" size={24} />
                            </div>
                            <h2 className="text-xl font-black uppercase text-gray-900">Activar Código {userId}</h2>
                            <p className="text-[10px] text-gray-400 font-black uppercase mt-1 tracking-widest">Configura tu perfil de emergencia</p>
                        </div>
                        <form className="p-6 space-y-4 overflow-y-auto pb-32" onSubmit={(e) => { e.preventDefault(); handleActivation(userId, form); }}>
                            <div className="flex p-1 bg-gray-100 rounded-2xl">
                                <button type="button" onClick={() => setForm({...form, type: 'human'})} className={`flex-1 py-4 rounded-xl font-black text-xs uppercase flex items-center justify-center transition-all ${form.type === 'human' ? 'bg-white shadow text-indigo-600' : 'text-gray-400'}`}><Icon name="user" size={16} className="mr-2"/> Persona</button>
                                <button type="button" onClick={() => setForm({...form, type: 'pet'})} className={`flex-1 py-4 rounded-xl font-black text-xs uppercase flex items-center justify-center transition-all ${form.type === 'pet' ? 'bg-white shadow text-green-600' : 'text-gray-400'}`}><Icon name="dog" size={16} className="mr-2"/> Mascota</button>
                            </div>
                            <div className="space-y-3">
                                <input required className="w-full p-5 bg-gray-50 border-2 border-transparent rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Nombre completo" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                                <input required className="w-full p-5 bg-gray-50 border-2 border-transparent rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Contacto de Emergencia (Nombre)" value={form.emergencyContact} onChange={e => setForm({...form, emergencyContact: e.target.value})} />
                                <input required className="w-full p-5 bg-gray-50 border-2 border-transparent rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Teléfono del contacto" type="tel" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white py-6 rounded-[28px] font-black uppercase tracking-widest shadow-xl shadow-indigo-100 active:scale-95 transition-all mt-4">Activar Mi Vital Link</button>
                        </form>
                    </div>
                );
            };

            const AdminDashboard = () => (
                <div className="h-full flex flex-col bg-gray-50">
                    <div className="p-6 bg-white border-b flex justify-between items-center sticky top-0 z-10">
                        <div>
                            <h2 className="text-2xl font-black text-gray-900 leading-none tracking-tight">Vital Link</h2>
                            <p className="text-[10px] text-gray-400 font-bold uppercase mt-1 tracking-widest">Inventario de Accesos</p>
                        </div>
                        <button onClick={() => setView('batch')} className="bg-indigo-600 text-white p-3 rounded-2xl font-bold text-xs flex items-center shadow-lg shadow-indigo-100 active:scale-95 transition-transform">
                            <Icon name="layers" size={16} className="mr-2"/> NUEVO LOTE
                        </button>
                    </div>
                    <div className="flex-1 p-4 space-y-3 overflow-y-auto pb-32">
                        {dbUsers.map(u => (
                            <div key={u.id} className={`bg-white p-4 rounded-[32px] shadow-sm border-2 transition-all ${u.status === 'pending' ? 'border-dashed border-gray-200 bg-gray-50/50' : 'border-transparent'}`}>
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center space-x-4">
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner ${u.status === 'pending' ? 'bg-white text-gray-300' : 'bg-indigo-50 text-indigo-600'}`}>
                                            {u.status === 'pending' ? <Icon name="qr" size={28}/> : <img src={u.photo} className="w-full h-full rounded-2xl object-cover" />}
                                        </div>
                                        <div>
                                            <p className="font-black text-gray-900 text-lg leading-none">{u.id}</p>
                                            <div className="flex items-center mt-1">
                                                <div className={`w-2 h-2 rounded-full mr-2 ${u.status === 'pending' ? 'bg-orange-400 animate-pulse' : 'bg-green-500'}`}></div>
                                                <p className={`text-[10px] uppercase font-black tracking-wider ${u.status === 'pending' ? 'text-orange-500' : 'text-gray-400'}`}>
                                                    {u.status === 'pending' ? 'Pendiente de activar' : u.name}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex space-x-2">
                                        <button onClick={() => { setSelectedUser(u); setView('scan'); }} className="p-3 text-indigo-600 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors">
                                            <Icon name="search" size={20}/>
                                        </button>
                                        {u.status === 'active' && (
                                            <button onClick={() => { setDbUsers(dbUsers.filter(x => x.id !== u.id)) }} className="p-3 text-red-600 bg-red-50 rounded-xl hover:bg-red-100 transition-colors">
                                                <Icon name="trash" size={20}/>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                        {dbUsers.length === 0 && (
                            <div className="py-20 text-center opacity-20">
                                <Icon name="layers" size={64} className="mx-auto mb-4" />
                                <p className="font-black uppercase text-sm">Sin registros</p>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-900 flex justify-center items-center font-sans">
                    <div className="w-full max-w-md h-[100vh] md:h-[90vh] bg-white relative flex flex-col md:rounded-[48px] overflow-hidden shadow-2xl">
                        
                        <div className="flex-1 overflow-hidden">
                            {view === 'admin' && <AdminDashboard />}
                            {view === 'batch' && <BatchView />}
                            {view === 'scan' && (
                                selectedUser?.status === 'pending' ? 
                                <RegistrationForm userId={selectedUser.id} /> : 
                                <div className="p-10 text-center h-full flex flex-col items-center justify-center animate-slide-up">
                                    <div className="bg-indigo-50 p-6 rounded-[40px] mb-8 border border-indigo-100 shadow-xl shadow-indigo-50">
                                        <QRGenerator value={`https://vital-link.app/id/${selectedUser.id}`} size={200} />
                                    </div>
                                    <h2 className="text-3xl font-black uppercase text-gray-900 tracking-tighter">{selectedUser.name}</h2>
                                    <div className="mt-2 inline-flex items-center px-4 py-1 bg-gray-100 rounded-full">
                                        <Icon name="ticket" size={14} className="mr-2 text-gray-400" />
                                        <p className="text-gray-400 font-black uppercase text-[10px] tracking-widest">{selectedUser.id}</p>
                                    </div>
                                    <div className="mt-8 space-y-3 w-full">
                                        <button className="w-full py-5 bg-gray-900 text-white rounded-3xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-transform flex items-center justify-center">
                                            <Icon name="activity" size={16} className="mr-2" /> Descargar QR
                                        </button>
                                        <button onClick={() => setView('admin')} className="w-full py-5 bg-gray-100 text-gray-500 rounded-3xl font-black uppercase text-xs tracking-widest active:scale-95 transition-transform">Volver</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Barra de Navegación inferior */}
                        <div className="no-print w-full h-24 bg-white/80 backdrop-blur-xl border-t flex items-center justify-around px-6 pb-2 z-50">
                            <button onClick={() => setView('admin')} className={`flex flex-col items-center transition-all ${view === 'admin' ? 'text-indigo-600 scale-110' : 'text-gray-300'}`}>
                                <div className={`p-2 rounded-xl ${view === 'admin' ? 'bg-indigo-50' : ''}`}>
                                    <Icon name="ticket" size={24} />
                                </div>
                                <span className="text-[9px] font-black uppercase mt-1 tracking-widest">Inventario</span>
                            </button>
                            
                            <button onClick={() => setView('batch')} className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-indigo-200 active:scale-90 transition-transform -mt-10 border-4 border-white">
                                <Icon name="plus" size={28} />
                            </button>
                            
                            <button 
                                onClick={() => { 
                                    const firstPending = dbUsers.find(u => u.status === 'pending') || dbUsers[0];
                                    setSelectedUser(firstPending); 
                                    setView('scan'); 
                                }} 
                                className={`flex flex-col items-center transition-all ${view === 'scan' ? 'text-indigo-600 scale-110' : 'text-gray-300'}`}
                            >
                                <div className={`p-2 rounded-xl ${view === 'scan' ? 'bg-indigo-50' : ''}`}>
                                    <Icon name="search" size={24} />
                                </div>
                                <span className="text-[9px] font-black uppercase mt-1 tracking-widest">Simular</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
